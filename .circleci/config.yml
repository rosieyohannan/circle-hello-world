version: 2.1

commands:
  print:
    parameters:
      message:
        type: string
    steps:
      - run: echo "Command received: << parameters.message >>"

jobs:
  daily-message:
    machine:
      image: ubuntu-2004:current
    resource_class: large
    parameters:
      message:
        type: string
        default: "Default job message"
    steps:
      - run: echo "Job parameter: << parameters.message >>"
      - print:
          message: "Passing to command: << parameters.message >>"

workflows:
  my-workflow:
    jobs:
      - daily-message:
          message: "Hello from workflow!"
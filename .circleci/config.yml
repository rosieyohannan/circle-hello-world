version: 2.1

jobs:
  my-job:
    docker:
      - image: cimg/base:current
    steps:
      - run: echo "Hello, world!"
      - run:
          name: "Flaky step with auto-rerun"
          command: |
            COUNTER_FILE="/tmp/step_attempts"
            if [ -f "$COUNTER_FILE" ]; then
              ATTEMPT=$(($(cat $COUNTER_FILE) + 1))
            else
              ATTEMPT=1
            fi
            echo $ATTEMPT > $COUNTER_FILE
            echo "Attempt: $ATTEMPT"

            if [ $ATTEMPT -le 3 ]; then
              echo "Failing intentionally (attempt $ATTEMPT of 4)"
              exit 1
            fi
            echo "Success on attempt $ATTEMPT!"
          max_auto_reruns: 3
          auto_rerun_delay: 10s

workflows:
  my-workflow:
    jobs:
      - my-job
